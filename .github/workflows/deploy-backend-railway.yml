name: Deploy backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Dockerfile"
      - "railway.json"
      - ".github/workflows/deploy-backend-railway.yml"
  workflow_dispatch:

concurrency:
  group: railway-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Railway production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: bb1357a4-f796-4cde-88ee-d26610ee912e
      RAILWAY_ENVIRONMENT: production
      RAILWAY_SERVICE_ID: c89e10c9-4cd3-4b7e-b3d7-8a57c156ff1d

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Guard Railway token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN GitHub secret is required for backend deploys."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: |
          railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE_ID" \
            --detach \
            --message "backend ${GITHUB_SHA}"

      - name: Wait for Railway deployment
        run: |
          for i in $(seq 1 60); do
            status="$(railway deployment list \
              --project "$RAILWAY_PROJECT_ID" \
              --environment "$RAILWAY_ENVIRONMENT" \
              --service "$RAILWAY_SERVICE_ID" \
              --limit 1 \
              --json | python -c 'import json,sys; print(json.load(sys.stdin)[0]["status"])')"
            echo "Railway status: $status"
            case "$status" in
              SUCCESS) exit 0 ;;
              FAILED|CRASHED|REMOVED|REMOVING|SKIPPED)
                railway logs \
                  --project "$RAILWAY_PROJECT_ID" \
                  --environment "$RAILWAY_ENVIRONMENT" \
                  --service "$RAILWAY_SERVICE_ID" \
                  --lines 120
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for Railway deployment."
          exit 1
